<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AutoPilot Life</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #141414; --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.14);
    --text: #f0ede6; --muted: rgba(240,237,230,0.45); --faint: rgba(240,237,230,0.2);
    --accent: #b8f066; --accent-dim: rgba(184,240,102,0.12); --accent-border: rgba(184,240,102,0.3);
    --amber: #f0b429; --amber-dim: rgba(240,180,41,0.1);
    --mono: 'DM Mono', monospace; --serif: 'Instrument Serif', serif;
  }
  html { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse 60% 40% at 10% 0%, rgba(184,240,102,0.04) 0%, transparent 70%),
                radial-gradient(ellipse 40% 50% at 90% 100%, rgba(184,240,102,0.03) 0%, transparent 70%), var(--bg);
  }
  .container { max-width: 560px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }
  .header { margin-bottom: 2.5rem; }
  .header-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; }
  .logo { font-family: var(--serif); font-size: 26px; font-style: italic; color: var(--text); }
  .logo span { color: var(--accent); font-style: normal; }
  .clock { font-size: 12px; color: var(--muted); letter-spacing: 0.04em; }
  .tagline { font-size: 12px; color: var(--faint); letter-spacing: 0.02em; }
  .input-section { margin-bottom: 2rem; }
  .input-wrap { display: flex; gap: 8px; }
  .task-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    padding: 12px 16px; font-family: var(--mono); font-size: 13px; color: var(--text);
    outline: none; transition: border-color 0.2s;
  }
  .task-input::placeholder { color: var(--faint); }
  .task-input:focus { border-color: var(--border-hover); }
  .add-btn {
    background: var(--accent); color: #0d0d0d; border: none; border-radius: 6px;
    padding: 12px 20px; font-family: var(--mono); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: opacity 0.15s, transform 0.1s; white-space: nowrap;
  }
  .add-btn:hover { opacity: 0.88; }
  .add-btn:active { transform: scale(0.97); }
  .next-action {
    background: var(--accent-dim); border: 1px solid var(--accent-border);
    border-radius: 10px; padding: 1.25rem 1.5rem; margin-bottom: 1.75rem;
    animation: slideIn 0.3s ease;
  }
  .na-eyebrow { font-size: 10px; letter-spacing: 0.12em; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; }
  .na-title { font-family: var(--serif); font-size: 22px; font-style: italic; color: var(--text); line-height: 1.3; margin-bottom: 6px; }
  .na-why { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .na-meta { font-size: 11px; color: var(--faint); margin-bottom: 14px; }
  .na-done-btn {
    background: transparent; border: 1px solid var(--accent-border); border-radius: 5px;
    padding: 7px 16px; font-family: var(--mono); font-size: 12px; color: var(--accent);
    cursor: pointer; transition: background 0.15s;
  }
  .na-done-btn:hover { background: var(--accent-dim); }
  .stats-bar {
    display: flex; gap: 20px; margin-bottom: 1.75rem; padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-size: 18px; font-weight: 500; color: var(--text); }
  .stat-label { font-size: 11px; color: var(--faint); letter-spacing: 0.04em; }
  .tasks-label { font-size: 10px; letter-spacing: 0.12em; color: var(--faint); text-transform: uppercase; margin-bottom: 10px; }
  .task-list { display: flex; flex-direction: column; gap: 6px; }
  .task-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; display: flex; align-items: flex-start; gap: 12px;
    transition: border-color 0.2s, opacity 0.25s; animation: slideIn 0.25s ease;
  }
  .task-card:hover { border-color: var(--border-hover); }
  .task-card.done { opacity: 0.3; }
  .check {
    width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border-hover);
    flex-shrink: 0; cursor: pointer; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .check:hover { border-color: var(--accent); }
  .check.checked { background: var(--accent); border-color: var(--accent); }
  .check.checked::after {
    content: ''; display: block; width: 5px; height: 9px;
    border: 1.5px solid #0d0d0d; border-top: none; border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }
  .task-body { flex: 1; min-width: 0; }
  .task-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .task-title { font-size: 13px; color: var(--text); }
  .task-title.done-text { text-decoration: line-through; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.06em; font-weight: 500; flex-shrink: 0; }
  .badge-now  { background: rgba(184,240,102,0.15); color: var(--accent); border: 1px solid var(--accent-border); }
  .badge-soon { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(240,180,41,0.3); }
  .badge-later{ background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .task-scheduled { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .task-reason    { font-size: 11px; color: var(--faint); margin-top: 2px; font-style: italic; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--faint); font-size: 13px; }
  .empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-top">
      <div class="logo">Auto<span>Pilot</span> Life</div>
      <div class="clock" id="clock"></div>
    </div>
    <div class="tagline">Tell it what. It decides when.</div>
  </div>

  <div class="input-section">
    <div class="input-wrap">
      <input class="task-input" id="task-input" type="text" placeholder="e.g. study for math tonight..." autocomplete="off" />
      <button class="add-btn" onclick="addTask()">Add →</button>
    </div>
  </div>

  <div id="stats-bar" class="stats-bar" style="display:none;">
    <div class="stat"><div class="stat-val" id="stat-total">0</div><div class="stat-label">tasks</div></div>
    <div class="stat"><div class="stat-val" id="stat-done">0</div><div class="stat-label">done</div></div>
    <div class="stat"><div class="stat-val" id="stat-urgent">0</div><div class="stat-label">urgent</div></div>
  </div>

  <div id="next-action-section" style="display:none;">
    <div class="next-action">
      <div class="na-eyebrow">▶ do this now</div>
      <div class="na-title" id="na-title"></div>
      <div class="na-why"   id="na-why"></div>
      <div class="na-meta"  id="na-meta"></div>
      <button class="na-done-btn" onclick="markNextDone()">Mark done ✓</button>
    </div>
  </div>

  <div class="tasks-label" id="tasks-label" style="display:none;">All tasks</div>
  <div class="task-list" id="task-list">
    <div class="empty"><div class="empty-icon">◎</div>Add a task above to get started.</div>
  </div>
</div>

<script>
const tasks = [];

// ---------- TIME HELPERS ----------
function getFutureTime(minOffset, maxOffset) {
  const d = new Date();
  const offset = minOffset + Math.random() * (maxOffset - minOffset);
  d.setMinutes(d.getMinutes() + offset);

  let h = d.getHours();
  const m = d.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;

  return `${h}:${String(m).padStart(2, '0')} ${ap}`;
}

function randomPrefix() {
  const arr = ['Around', 'At', 'Try', 'Aim for'];
  return arr[Math.floor(Math.random() * arr.length)];
}

// ---------- CLOCK ----------
function updateClock() {
  const n = new Date(), h = n.getHours(), m = n.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM', hh = h % 12 || 12;
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('clock').textContent =
    `${days[n.getDay()]} ${hh}:${String(m).padStart(2,'0')} ${ap}`;
}
setInterval(updateClock, 1000);
updateClock();

// ---------- SCHEDULER ----------
function scheduleTask(raw) {
  const t = raw.toLowerCase();
  const h = new Date().getHours();
  const has = words => words.some(w => t.includes(w));

  // Clean title
  let title = raw
    .replace(/\b(i should|i need to|i have to|i gotta|remind me to|don't forget to|remember to)\b/gi, '')
    .replace(/\b(sometime|maybe|possibly|probably)\b/gi, '')
    .trim();
  title = title.charAt(0).toUpperCase() + title.slice(1);
  if (title.length > 55) title = title.slice(0, 55).trim() + '…';

  const time = (a, b) => `${randomPrefix()} ${getFutureTime(a, b)}`;

  // URGENT
  if (has(['now','asap','urgent','immediately']))
    return { title, scheduled: 'Right now', reason: 'Urgent — do it immediately.', badge: 'now' };
 
 // URGENT
  if (has(['game','games','play','relax','watch','chill']))
    return { title, scheduled: 'Way later', reason: 'Do it after everything else.', badge: 'later' };

  // STUDY
  if (has(['study','homework','assignment','exam','test','quiz'])) {
  if (h < 14) return { title, scheduled: time(60,120), reason: 'Good focus window coming up.', badge: 'soon' };
  if (h < 20) return { title, scheduled: time(30,90),  reason: 'Solid evening study block.',  badge: 'soon' };
  if (h < 23) return { title, scheduled: time(15,45),  reason: 'Quick late-night review.',   badge: 'now' };
  return { title, scheduled: time(600,900), reason: 'Better done fresh tomorrow.', badge: 'later' };
}

  // MESSAGES
  if (has(['email','text','call','reply','dm','message'])) {
    if (h < 20) return { title, scheduled: time(10,30), reason: 'Quick communication task.', badge: 'now' };
    return { title, scheduled: time(600,800), reason: 'Send it in the morning.', badge: 'later' };
  }

  // CHORES
  if (has(['clean','laundry','dishes','trash','cook','groceries'])) {
    if (h < 18) return { title, scheduled: time(30,90), reason: 'Nice productivity break.', badge: 'soon' };
    return { title, scheduled: time(15,45), reason: 'Quick win before relaxing.', badge: 'now' };
  }

  // WORKOUT
  if (has(['gym','workout','run','exercise'])) {
    if (h < 15) return { title, scheduled: time(120,240), reason: 'Great later energy boost.', badge: 'later' };
    return { title, scheduled: time(600,900), reason: 'Best done tomorrow morning.', badge: 'later' };
  }

  // GENERIC
if (h < 12) {
  return { title, scheduled: time(30,90), reason: 'Good morning momentum.', badge: 'soon' };
}

if (h < 17) {
  return { title, scheduled: time(30,120), reason: 'Fits nicely into your day.', badge: 'soon' };
}

if (h < 21) {
  return { title, scheduled: time(15,60), reason: 'You still have time tonight.', badge: 'soon' };
}

// ONLY very late → tomorrow
return { title, scheduled: time(600,900), reason: 'Start before you sleep, finish tomorrow.', badge: 'later' };
}
// ---------- TASK ACTIONS ----------
function addTask() {
  const input = document.getElementById('task-input');
  const raw = input.value.trim();
  if (!raw) return;

  const result = scheduleTask(raw);

  // 🛡 safety fallback (prevents crashes)
  if (!result) {
    console.error("scheduleTask returned nothing");

    tasks.push({
      id: Date.now(),
      title: raw,
      scheduled: "Soon",
      reason: "Fallback scheduling.",
      badge: "soon",
      done: false
    });
  } else {
    tasks.push({ id: Date.now(), ...result, done: false });
  }

  input.value = '';
  input.focus();
  render();
}

function markNextDone() {
  const t = tasks.find(t => !t.done && t.badge === 'now');
  if (t) { t.done = true; render(); }
}

function toggleDone(id) {
  const t = tasks.find(x => x.id === id);
  if (t) { t.done = !t.done; render(); }
}

// ---------- RENDER ----------
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const list = document.getElementById('task-list');
  const naSection = document.getElementById('next-action-section');
  const statsBar = document.getElementById('stats-bar');
  const tasksLabel = document.getElementById('tasks-label');

  if (tasks.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">◎</div>Add a task above to get started.</div>';
    naSection.style.display = statsBar.style.display = tasksLabel.style.display = 'none';
    return;
  }

  tasksLabel.style.display = 'block';
  statsBar.style.display = 'flex';

  document.getElementById('stat-total').textContent = tasks.length;
  document.getElementById('stat-done').textContent = tasks.filter(t => t.done).length;
  document.getElementById('stat-urgent').textContent = tasks.filter(t => !t.done && t.badge === 'now').length;

  const nowTask = tasks.find(t => !t.done && t.badge === 'now');
  if (nowTask) {
    naSection.style.display = 'block';
    document.getElementById('na-title').textContent = nowTask.title;
    document.getElementById('na-why').textContent = nowTask.reason || '';
    document.getElementById('na-meta').textContent = `Suggested: ${nowTask.scheduled}`;
  } else {
    naSection.style.display = 'none';
  }

  const order = { now: 0, soon: 1, later: 2,};
  const sorted = [...tasks].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    return (order[a.badge] ?? 2) - (order[b.badge] ?? 2);
  });

  list.innerHTML = sorted.map(t => `
    <div class="task-card ${t.done ? 'done' : ''}">
      <div class="check ${t.done ? 'checked' : ''}" onclick="toggleDone(${t.id})"></div>
      <div class="task-body">
        <div class="task-top">
          <span class="task-title ${t.done ? 'done-text' : ''}">${esc(t.title)}</span>
          <span class="badge badge-${t.badge}">${t.badge}</span>
        </div>
        <div class="task-scheduled">${esc(t.scheduled)}</div>
        <div class="task-reason">${esc(t.reason)}</div>
      </div>
    </div>
  `).join('');
}

document.getElementById('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

render();
</script>
</body>
</html>
