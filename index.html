<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AutoPilot Life</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=Instrument+Serif&display=swap" rel="stylesheet"/>

<style>
/* (unchanged styles — kept your exact design) */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0d0d0d; --surface:#141414; --surface2:#1c1c1c;
  --border:rgba(255,255,255,0.07); --border-hover:rgba(255,255,255,0.14);
  --text:#f0ede6; --muted:rgba(240,237,230,0.45); --faint:rgba(240,237,230,0.2);
  --accent:#b8f066; --accent-dim:rgba(184,240,102,0.12); --accent-border:rgba(184,240,102,0.3);
  --mono:'DM Mono', monospace; --serif:'Instrument Serif', serif;
}
html { background:var(--bg); color:var(--text); font-family:var(--mono); }
.container { max-width:560px; margin:auto; padding:2rem; }
.logo { font-family:var(--serif); font-size:26px; }
.logo span { color:var(--accent); }
.task-input { width:100%; padding:10px; margin-top:10px; background:var(--surface); color:white; border:1px solid var(--border);}
.add-btn { margin-top:10px; padding:10px; background:var(--accent); border:none; cursor:pointer;}
.task-card { background:var(--surface); margin-top:10px; padding:10px; border-radius:6px;}
</style>
</head>

<body>
<div class="container">
  <div class="logo">Auto<span>Pilot</span> Life</div>

  <input id="task-input" class="task-input" placeholder="Add a task..."/>
  <button class="add-btn" onclick="addTask()">Add</button>

  <div id="task-list"></div>
</div>

<script>
const tasks = [];

/* ---------- NEW TIME SYSTEM ---------- */

function getStaggeredDelay(baseMinutes, spacing = 15) {
  const active = tasks.filter(t => !t.done);
  return baseMinutes + active.length * spacing;
}

function formatDelay(minutes) {
  if (minutes < 60) return `In ${minutes} minutes`;
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  if (m === 0) return `In ${h} hour${h > 1 ? 's' : ''}`;
  return `In ${h}h ${m}m`;
}

/* ---------- SMART SCHEDULER ---------- */

function scheduleTask(text) {
  const t = text.toLowerCase();

  let base = 60;
  let badge = 'later';
  let reason = 'Scheduled automatically.';

  if (t.includes('urgent') || t.includes('now')) {
    base = 5;
    badge = 'now';
    reason = 'Do this immediately.';
  }
  else if (t.includes('study') || t.includes('homework')) {
    base = 30;
    badge = 'now';
    reason = 'Good focus window.';
  }
  else if (t.includes('clean') || t.includes('laundry')) {
    base = 45;
    badge = 'soon';
    reason = 'Quick productivity task.';
  }

  const delay = getStaggeredDelay(base);

  return {
    id: Date.now(),
    title: text,
    scheduled: formatDelay(delay),
    reason,
    badge,
    done: false
  };
}

/* ---------- CORE FUNCTIONS ---------- */

function addTask() {
  const input = document.getElementById('task-input');
  if (!input.value.trim()) return;

  tasks.push(scheduleTask(input.value));
  input.value = '';
  render();
}

function toggleDone(id) {
  const t = tasks.find(x => x.id === id);
  if (t) t.done = !t.done;
  render();
}

function render() {
  const list = document.getElementById('task-list');

  list.innerHTML = tasks.map(t => `
    <div class="task-card" style="opacity:${t.done ? 0.4 : 1}">
      <div><strong>${t.title}</strong></div>
      <div>${t.scheduled}</div>
      <div style="font-size:12px;color:gray">${t.reason}</div>
      <button onclick="toggleDone(${t.id})">
        ${t.done ? 'Undo' : 'Done'}
      </button>
    </div>
  `).join('');
}

/* enter key support */
document.getElementById('task-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});
</script>
</body>
</html>
